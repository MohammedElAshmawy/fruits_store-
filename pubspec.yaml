name: e_commerce
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.0
  flutter_gen: ^5.10.0
  dots_indicator: ^4.0.1
  shared_preferences: ^2.5.3
  firebase_core: ^4.0.0
  dartz: ^0.10.1
  firebase_auth: ^6.0.0
  flutter_bloc: ^9.1.1
  get_it: ^8.2.0
  bloc_provider: ^1.0.0
  modal_progress_hud_nsn: ^0.5.1
  lottie: ^3.3.1
  google_sign_in: ^6.2.1
  cloud_firestore: ^6.0.1
  flutter_svg_provider: ^1.0.7
  supabase_flutter: ^2.12.0
  equatable: ^2.0.8
  skeletonizer: ^2.1.3
  auto_size_text: ^3.0.0
  cached_network_image: ^3.4.1
  provider: ^6.1.5+1
  flutter_paypal_payment: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner:
  flutter_gen_runner:
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/activated_icons/
    - assets/unactivated_icons/

  fonts:
    - family: 'Cairo'
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700